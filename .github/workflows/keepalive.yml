name: Supabase Keep-Alive
on:
  schedule:
    - cron: "0 12 * * 1,4"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        env:
          KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "ERROR: secret is empty - check the secret name"
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $KEY" "https://auatsfoqjezmduxqsdvi.supabase.co/rest/v1/")
          echo "HTTP $code"
          test "$code" = "200"
