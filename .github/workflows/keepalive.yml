name: Supabase Keep-Alive
on:
  schedule:
    - cron: "0 12 * * 1,4"   # Mon & Thu 12:00 UTC
  workflow_dispatch:          # manual run button for testing
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            "https://auatsfoqjezmduxqsdvi.supabase.co/rest/v1/" \
            || exit 1
